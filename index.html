    <meta property="og:site_name" content="See-Me-Fly" />
    <meta property="og:title" content="See-Me-Fly" />
    <meta property="og:description" content="Upload a flight-log CSV for an instant dashboard of your travels — routes, airports, countries, and maps. 100% local, nothing uploaded." />
    <meta property="og:url" content="https://theonenonlyvj.github.io/see-me-fly/" />
    <meta property="og:image" content="https://theonenonlyvj.github.io/see-me-fly/og-image.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="See Me Fly — turn your flight-log CSV into a travel dashboard" />

    <!-- Twitter / X large-summary card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="See-Me-Fly" />
    <meta name="twitter:description" content="Upload a flight-log CSV for an instant dashboard of your travels — routes, airports, countries, and maps. 100% local, nothing uploaded." />
